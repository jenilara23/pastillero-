publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.0.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  flutter_slidable: ^3.1.0
  google_fonts: ^6.2.1
  timezone: ^0.9.4
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.9.0
  flutter_dotenv: ^5.2.1
  flutter_blue_plus: ^1.35.5
  wifi_scan: ^0.4.1+2
  permission_handler: ^11.3.1
  avatar_maker: ^1.5.0
  image_picker: ^1.0.7
  image: ^4.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
